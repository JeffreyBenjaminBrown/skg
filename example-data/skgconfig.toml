db_name = "skg-dev"
tantivy_folder = ".index.tantivy"
port = 1730 # TCP port for Rust-Emacs API communication.
default_source_set = "public"

[[sources]]
name = "private"
path = "private"
user_owns_it = true

[[sources]]
name = "public"
path = "public"
user_owns_it = true

[[sources]]
name = "Fred"
path = "Fred"
user_owns_it = false

# The reserved source-set name "all" is already defined by skg and
# means every configured source, so you do not need to list it here.
[[source_sets]]
# Source names and source-set names are different namespaces, so it is
# okay for this source-set to have the same name as the "public" source.
name = "public"
sources = ["public"]
