db_name = "unused"
tantivy_folder = "/tmp/unused"
port = 0
beep_when_server_becomes_available = false

# The golden/ sibling directory holds expected-output files; it is
# deliberately NOT a source, so telescope writes (whose stale-section
# sweep deletes same-pid files in other owned sources) cannot touch
# the goldens. owned/ holds input fixtures for the db-backed tests.

[[sources]]
name = "output"
path = "owned/output"  # overridden by tests
